<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tokenstopia / Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f9f9f8;
        --bg-2: #f2f1ee;
        --panel: #ffffff;
        --panel-soft: #f4f4f0;
        --text: #2d3433;
        --muted: #757e7a;
        --line: rgba(87, 96, 91, 0.12);
        --accent: #57605b;
        --shadow: 0 20px 40px rgba(45, 52, 51, 0.04);
        --radius: 20px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "SF Pro Text", "Segoe UI", sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      }

      .shell {
        width: min(1120px, calc(100vw - 56px));
        margin: 0 auto 56px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .hero {
        padding: 24px 10px 34px;
        display: grid;
        gap: 20px;
      }

      .hero-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        min-height: 72px;
        border-bottom: 1px solid rgba(87, 96, 91, 0.08);
      }

      .brand {
        font-family: "Newsreader", Georgia, serif;
        font-size: 1.55rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .topnav {
        display: flex;
        align-items: center;
        gap: 28px;
        margin-left: auto;
        margin-right: 16px;
      }

      .topnav a {
        color: var(--muted);
        text-decoration: none;
        font-family: "Newsreader", Georgia, serif;
        font-style: italic;
        font-size: 0.95rem;
      }

      .topnav a:hover {
        color: var(--text);
      }

      .hero-copy {
        color: var(--muted);
        max-width: 60ch;
        line-height: 1.8;
        font-size: 0.96rem;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      h1 {
        margin-top: 10px;
        font-family: "Newsreader", Georgia, serif;
        font-size: clamp(3rem, 5vw, 5rem);
        line-height: 0.94;
        letter-spacing: -0.05em;
        font-weight: 700;
        max-width: 10ch;
      }

      .grid {
        display: grid;
        gap: 22px;
        margin-top: 28px;
      }

      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .two-col {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        padding: 22px;
        background: rgba(255, 255, 255, 0.88);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .metric {
        font-family: "Newsreader", Georgia, serif;
        font-size: clamp(2.8rem, 4.8vw, 4.6rem);
        font-weight: 600;
        line-height: 0.9;
        letter-spacing: -0.06em;
        margin-top: 12px;
      }

      .muted {
        color: var(--muted);
      }

      .mini-label {
        color: var(--muted);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .card h2 {
        font-family: "Newsreader", Georgia, serif;
        font-size: 1.7rem;
        line-height: 1.04;
        letter-spacing: -0.04em;
        font-weight: 600;
      }

      .list {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: inset 0 0 0 1px rgba(87, 96, 91, 0.08);
      }

      .table {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .table-item {
        padding: 16px;
        border-radius: 14px;
        border: 0;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: inset 0 0 0 1px rgba(87, 96, 91, 0.08);
      }

      .table-item p {
        color: var(--muted);
        line-height: 1.7;
        margin-top: 6px;
      }

      .table-item strong {
        display: block;
        font-family: "Newsreader", Georgia, serif;
        font-size: 1.2rem;
        line-height: 1.1;
        letter-spacing: -0.03em;
      }

      .nav {
        display: none;
      }

      .lang-toggle {
        border: 0;
        background: transparent;
        color: var(--text);
        border-radius: 8px;
        padding: 14px 0 14px 12px;
        cursor: pointer;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.72rem;
        font-weight: 600;
      }

      @media (max-width: 820px) {
        .stats,
        .two-col {
          grid-template-columns: 1fr;
        }

        .shell {
          width: min(100vw - 24px, 1240px);
        }

        .hero {
          padding-inline: 0;
        }

        .hero-top {
          min-height: 64px;
        }

        .topnav {
          display: none;
        }

        h1 {
          font-size: clamp(2.4rem, 11vw, 3.6rem);
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-top">
          <div class="brand">Tokenstopia</div>
          <nav class="topnav">
            <a id="back-link" href="/">Assessment</a>
            <a href="/#manifesto-section">Discussion</a>
            <a href="/#results-sidebar">About</a>
            <a href="/stockgist/index.html">StockGist</a>
          </nav>
          <button id="lang-toggle" type="button" class="lang-toggle">EN</button>
        </div>
        <div>
          <div class="eyebrow">System overview</div>
          <h1 id="page-title">Tokenstopia 数据概览</h1>
        </div>
        <p id="page-copy" class="hero-copy">这里展示数据库里最近保存的测试结果和留言。适合快速看整体趋势，不适合做深度统计分析。</p>
      </section>

      <section class="grid stats">
        <article class="card">
          <div id="metric-total-label" class="mini-label">总提交数</div>
          <div id="total-submissions" class="metric">-</div>
        </article>
        <article class="card">
          <div id="metric-score-label" class="mini-label">平均分</div>
          <div id="avg-score" class="metric">-</div>
        </article>
        <article class="card">
          <div id="metric-percent-label" class="mini-label">平均可能性</div>
          <div id="avg-percent" class="metric">-</div>
        </article>
      </section>

      <section class="grid two-col">
        <article class="card">
          <h2 id="identity-title">身份分布</h2>
          <div id="identity-list" class="list"></div>
        </article>
        <article class="card">
          <h2 id="strength-title">最常见强项 / 弱项</h2>
          <div id="strongest-list" class="list"></div>
          <div id="weakest-list" class="list"></div>
        </article>
      </section>

      <section class="grid two-col">
        <article class="card">
          <h2 id="submission-title">最近提交</h2>
          <div id="submission-list" class="table"></div>
        </article>
        <article class="card">
          <h2 id="message-title">最近留言</h2>
          <div id="message-list" class="table"></div>
        </article>
      </section>
    </main>

    <script type="module">
      const LANGUAGE_STORAGE_KEY = "tokenstopia-language";
      const state = {
        language: localStorage.getItem(LANGUAGE_STORAGE_KEY) || "zh",
      };

      const COPY = {
        zh: {
          toggle: "EN",
          pageTitle: "Tokenstopia 数据概览",
          pageCopy: "这里展示数据库里最近保存的测试结果和留言。适合快速看整体趋势，不适合做深度统计分析。",
          backLink: "返回主站",
          metricTotalLabel: "总提交数",
          metricScoreLabel: "平均分",
          metricPercentLabel: "平均可能性",
          identityTitle: "身份分布",
          strengthTitle: "最常见强项 / 弱项",
          submissionTitle: "最近提交",
          messageTitle: "最近留言",
          emptySubmission: "还没有提交记录。",
          emptyMessage: "还没有留言。",
          emptyIdentity: "还没有身份分布数据。",
          emptyStrongest: "还没有强项数据。",
          emptyWeakest: "还没有弱项数据。",
          unnamed: "未命名",
          strongestPrefix: "最强项：",
          weakestPrefix: "最弱项：",
        },
        en: {
          toggle: "中文",
          pageTitle: "Tokenstopia Analytics",
          pageCopy: "This page shows the latest saved submissions and comments in the database. It is useful for quick trend checks, not deep statistical analysis.",
          backLink: "Back to main site",
          metricTotalLabel: "Total submissions",
          metricScoreLabel: "Average score",
          metricPercentLabel: "Average likelihood",
          identityTitle: "Identity distribution",
          strengthTitle: "Most common strengths / weaknesses",
          submissionTitle: "Recent submissions",
          messageTitle: "Recent comments",
          emptySubmission: "No submissions yet.",
          emptyMessage: "No comments yet.",
          emptyIdentity: "No identity distribution data yet.",
          emptyStrongest: "No strength data yet.",
          emptyWeakest: "No weakness data yet.",
          unnamed: "Unnamed",
          strongestPrefix: "Strongest: ",
          weakestPrefix: "Weakest: ",
        },
      };

      function byId(id) {
        return document.getElementById(id);
      }

      function t(key) {
        return COPY[state.language][key];
      }

      function applyTranslations() {
        byId("lang-toggle").textContent = t("toggle");
        byId("page-title").textContent = t("pageTitle");
        byId("page-copy").textContent = t("pageCopy");
        byId("back-link").textContent = t("backLink");
        byId("metric-total-label").textContent = t("metricTotalLabel");
        byId("metric-score-label").textContent = t("metricScoreLabel");
        byId("metric-percent-label").textContent = t("metricPercentLabel");
        byId("identity-title").textContent = t("identityTitle");
        byId("strength-title").textContent = t("strengthTitle");
        byId("submission-title").textContent = t("submissionTitle");
        byId("message-title").textContent = t("messageTitle");
      }

      function renderKeyValueList(el, rows, emptyText) {
        el.textContent = "";
        if (!rows || rows.length === 0) {
          const empty = document.createElement("p");
          empty.className = "muted";
          empty.textContent = emptyText;
          el.appendChild(empty);
          return;
        }

        for (const row of rows) {
          const item = document.createElement("div");
          item.className = "row";
          item.innerHTML = `<span>${row.label}</span><strong>${row.count}</strong>`;
          el.appendChild(item);
        }
      }

      function renderSubmissions(el, rows) {
        el.textContent = "";
        if (!rows || rows.length === 0) {
          const empty = document.createElement("p");
          empty.className = "muted";
          empty.textContent = t("emptySubmission");
          el.appendChild(empty);
          return;
        }

        for (const row of rows) {
          const item = document.createElement("article");
          item.className = "table-item";
          item.innerHTML = `
            <strong>${row.identityLabel} · ${row.totalScore}/100</strong>
            <p>${row.aiName || t("unnamed")} ${row.testerName ? `· ${row.testerName}` : ""}</p>
            <p>${t("strongestPrefix")}${row.strongestTitle}</p>
            <p>${t("weakestPrefix")}${row.weakestTitle}</p>
            <p>${row.createdAt}</p>
          `;
          el.appendChild(item);
        }
      }

      function renderMessages(el, rows) {
        el.textContent = "";
        if (!rows || rows.length === 0) {
          const empty = document.createElement("p");
          empty.className = "muted";
          empty.textContent = t("emptyMessage");
          el.appendChild(empty);
          return;
        }

        for (const row of rows) {
          const item = document.createElement("article");
          item.className = "table-item";
          item.innerHTML = `
            <strong>${row.aiName} · ${row.identityLabel}</strong>
            <p>${row.body}</p>
            <p>${row.createdAt}</p>
          `;
          el.appendChild(item);
        }
      }

      byId("lang-toggle").addEventListener("click", () => {
        state.language = state.language === "zh" ? "en" : "zh";
        localStorage.setItem(LANGUAGE_STORAGE_KEY, state.language);
        init();
      });

      async function init() {
        applyTranslations();
        const response = await fetch("/api/analytics");
        const data = await response.json();

        byId("total-submissions").textContent = data.overview?.total_submissions ?? 0;
        byId("avg-score").textContent = data.overview?.avg_score ?? 0;
        byId("avg-percent").textContent = `${data.overview?.avg_percent ?? 0}%`;

        renderKeyValueList(byId("identity-list"), data.identities, t("emptyIdentity"));
        renderKeyValueList(byId("strongest-list"), data.strongest, t("emptyStrongest"));
        renderKeyValueList(byId("weakest-list"), data.weakest, t("emptyWeakest"));
        renderSubmissions(byId("submission-list"), data.recentSubmissions);
        renderMessages(byId("message-list"), data.recentMessages);
      }

      init();
    </script>
  </body>
</html>
